<style>
@media (max-width: 767px) {
	.address-card {
		display: flex;
		align-items: center;
		padding: 12px 10px;
		border-radius: 10px;
		border: 1px solid #eee;
		margin-bottom: 10px;
		font-size: 15px;
		position: relative;
	}
	.address-card input[type="radio"].address-radio {
		margin-right: 12px;
		accent-color: var(--primary, #ff469e);
		width: 20px;
		height: 20px;
	}
	.btn-new-address {
		width: 100%;
		margin-top: 10px;
		font-size: 16px;
		padding: 10px 0;
	}
	.address-header h6 {
		font-size: 17px;
	}
}
</style>
<script>
frappe.ready(() => {
	// Mobile: chọn địa chỉ bằng radio, desktop: click card
	function isMobile() {
		return window.innerWidth <= 767;
	}

	function activateAddressCard($target) {
		const $section = $target.closest('[data-section]');
		$section.find('.address-card').removeClass('active');
		$target.addClass('active');
		if (isMobile()) {
			$target.find('input[type="radio"]').prop('checked', true);
		}
	}

	$(document).on('click', '.address-card', (e) => {
		if (!isMobile()) {
			activateAddressCard($(e.currentTarget));
		}
	});

	$(document).on('change', '.address-radio', function(e) {
		if (isMobile()) {
			activateAddressCard($(this).closest('.address-card'));
		}
	});

	$('#input_same_billing').change((e) => {
		const $check = $(e.target);
		toggle_billing_address_section(!$check.is(':checked'));
	});

	$('.btn-new-address').click(() => {
		const d = new frappe.ui.Dialog({
			title: '{{_("Địa chỉ mới") }}',
			fields: [
				{
					label: '{{ _("Tiêu đề địa chỉ") }}',
					fieldname: 'address_title',
					fieldtype: 'Data',
					reqd: 1
				},
				{
					label: '{{ _("Địa chỉ dòng 1") }}',
					fieldname: 'address_line1',
					fieldtype: 'Data',
					reqd: 1
				},
				{
					label: '{{ _("Địa chỉ dòng 2") }}',
					fieldname: 'address_line2',
					fieldtype: 'Data'
				},
				{
					label: '{{ _("Thành phố/Thị xã") }}',
					fieldname: 'city',
					fieldtype: 'Data',
					reqd: 1
				},
				{
					label: '{{ _("Tỉnh/Thành phố") }}',
					fieldname: 'state',
					fieldtype: 'Data'
				},
				{
					label: '{{ _("Quốc gia") }}',
					fieldname: 'country',
					fieldtype: 'Link',
					options: 'Country',
					only_select: true,
					reqd: 1
				},
				{
					fieldname: "column_break0",
					fieldtype: "Column Break",
					width: "50%"
				},
				{
					label: '{{ _("Loại địa chỉ") }}',
					fieldname: 'address_type',
					fieldtype: 'Select',
					options: [
						'Thanh toán',
						'Giao hàng'
					],
					reqd: 1
				},
				{
					label: '{{ _("Mã bưu điện") }}',
					fieldname: 'pincode',
					fieldtype: 'Data'
				},
				{
					fieldname: "phone",
					fieldtype: "Data",
					label: '{{ _("Số điện thoại") }}',
					reqd: 1
				},
			],
			primary_action_label: '{{ _("Lưu") }}',
			primary_action: (values) => {
				frappe.call('webshop.webshop.shopping_cart.cart.add_new_address', { doc: values })
					.then(r => {
						frappe.call({
							method: "webshop.webshop.shopping_cart.cart.update_cart_address",
							args: {
								address_type: r.message.address_type,
								address_name: r.message.name
							},
							callback: function (r) {
								d.hide();
								window.location.reload();
							}
						});
					});
			}
		})
		d.show();
	});

	function setup_state() {
		const shipping_address = $('[data-section="shipping-address"]')
			.find('[data-address-name][data-active]').attr('data-address-name');
		const billing_address = $('[data-section="billing-address"]')
			.find('[data-address-name][data-active]').attr('data-address-name');
		$('#input_same_billing').prop('checked', shipping_address === billing_address).trigger('change');
		if (!shipping_address && !billing_address) {
			$('#input_same_billing').prop('checked', true).trigger('change');
		}
		if (shipping_address) {
			$(`[data-section="shipping-address"] [data-address-name="${shipping_address}"] .address-card`).addClass('active');
		}
		if (billing_address) {
			$(`[data-section="billing-address"] [data-address-name="${billing_address}"] .address-card`).addClass('active');
		}
		// Mobile: auto check radio for active
		if (isMobile()) {
			$('.address-card.active input[type="radio"]').prop('checked', true);
		}
	}
	setup_state();
	function toggle_billing_address_section(flag) {
		$('[data-section="billing-address"]').toggle(flag);
	}

	// Khi resize, cập nhật lại radio checked cho mobile
	$(window).on('resize', function() {
		setup_state();
	});
});
</script>
<style>
@media (max-width: 767px) {
	.address-card {
		display: flex;
		align-items: center;
		padding: 12px 10px;
		border-radius: 10px;
		border: 1px solid #eee;
		margin-bottom: 10px;
		font-size: 15px;
		position: relative;
	}
	.address-card input[type="radio"].address-radio {
		margin-right: 12px;
		accent-color: var(--primary, #ff469e);
		width: 20px;
		height: 20px;
	}
	.btn-new-address {
		width: 100%;
		margin-top: 10px;
		font-size: 16px;
		padding: 10px 0;
	}
	.address-header h6 {
		font-size: 17px;
	}
}
</style>
</script>

<script>
	frappe.ready(() => {
		function get_update_address_dialog() {
			let d = new frappe.ui.Dialog({
				title: "Chọn địa chỉ",
				fields: [{
					'fieldtype': 'HTML',
					'fieldname': 'address_picker',
				}],
				primary_action_label: __('Chọn địa chỉ'),
				primary_action: () => {
					const $card = d.$wrapper.find('.address-card.active');
					const address_type = $card.closest('[data-address-type]').attr('data-address-type');
					const address_name = $card.closest('[data-address-name]').attr('data-address-name');
					frappe.call({
						type: "POST",
						method: "webshop.webshop.shopping_cart.cart.update_cart_address",
						freeze: true,
						args: {
							address_type,
							address_name
						},
						callback: function(r) {
							d.hide();
							if (!r.exc) {
								$(".cart-tax-items").html(r.message.total);
								shopping_cart.parent.find(
									`.address-container[data-address-type="${address_type}"]`
								).html(r.message.address);
							}
						}
					});
				}
			});

			return d;
		}

		function get_address_template(type) {
			return {
				shipping: `<div class="mb-3" data-section="shipping-address">
					<div class="row no-gutters" data-fieldname="shipping_address_name">
						{% for address in shipping_addresses %}
							<div class="mr-3 mb-3 w-100" data-address-name="{{address.name}}" data-address-type="shipping"
								{% if doc.shipping_address_name == address.name %} data-active {% endif %}>
								{% include "templates/includes/cart/address_picker_card.html" %}
							</div>
						{% endfor %}
					</div>
				</div>`,
				billing: `<div class="mb-3" data-section="billing-address">
					<div class="row no-gutters" data-fieldname="customer_address">
						{% for address in billing_addresses %}
							<div class="mr-3 mb-3 w-100" data-address-name="{{address.name}}" data-address-type="billing"
								{% if doc.shipping_address_name == address.name %} data-active {% endif %}>
								{% include "templates/includes/cart/address_picker_card.html" %}
							</div>
						{% endfor %}
					</div>
				</div>`,
			}[type];
		}

		$(document).on('click', '.btn-change-address', (e) => {
			const d = get_update_address_dialog();
			const type = $(e.currentTarget).parents('.address-container').attr('data-address-type');

			$(d.get_field('address_picker').wrapper).html(
				get_address_template(type)
			);

			d.show();
		});
	});
</script>
